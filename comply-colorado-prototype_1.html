<style>
:root{--navy:#1f3b63;--navy2:#2a4d7a;--rail:#eef1f5;--line:#d7dee8;--ink:#1c2431;--muted:#5b6b7f;

*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:#fff}
.app{display:flex;min-height:100vh}
.side{width:250px;background:var(--rail);border-right:1px solid var(--line);padding:22px 16px;flex-shrink:0}
.brand{color:var(--navy);font-weight:700;font-size:19px;text-align:center}

.hr{height:1px;background:var(--line);margin:18px 0}
.navbtn{display:block;width:100%;text-align:left;border:none;background:var(--navy);color:#fff;padding:11px 14px;border-radius:6px;margin-bottom:9px;font-size:14px;cursor:pointer}
.navbtn.ghost{background:#fff;color:var(--navy);border:1px solid var(--navy)}
.seclbl{font-size:12px;font-weight:700;color:var(--muted);margin:6px 4px}

.sub{color:var(--muted);margin:0 0 18px}
.bar{height:9px;background:#e7ecf2;border-radius:6px;overflow:hidden;margin:10px 0 26px}
.bar > i{display:block;height:100%;background:var(--navy);width:0%}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{border:1.5px solid var(--navy);border-radius:9px;padding:16px;display:flex;flex-direction:column;gap:6px;background:#fff}
.card h3{color:var(--navy);margin:0;font-size:17px}
.card .hook{font-size:11.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
.card .desc{font-size:13px;color:#33414f;min-height:34px}
.card .meta{font-size:12.5px;margin-top:4px}
.cnt{font-weight:700}
.editbtn{align-self:flex-start;margin-top:8px;background:var(--navy);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:13px;cursor:pointer}
.badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.03em}
.b-Statutory{background:var(--statbg);color:var(--stat)}
.b-Provisional{background:var(--provbg);color:var(--prov)}
.b-Contested{background:var(--contbg);color:var(--cont)}
.model{background:#eef4fb;border:1px solid #cfe0f2;border-radius:8px;padding:16px;color:var(--navy2);font-size:14px;line-height:1.5;margin:6px 0 22px}
.model .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:8px}
.crit{border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.crit .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.crit .id{font-family:ui-monospace,Menlo,monospace;font-weight:700;color:var(--navy)}
.crit .stmt{margin:6px 0;font-size:13.5px}
.crit .hook{font-size:11.5px;color:var(--muted);font-family:ui-monospace,Menlo,monospace}
.crit .ferpa{font-size:12px;color:var(--stat);background:var(--statbg);padding:6px 10px;border-radius:5px;margin-top:8px;display:inline-block}
.crit select{margin-top:8px;padding:7px 10px;border:1px solid var(--line);border-radius:6px;font-size:13px}
.sectitle{color:var(--navy);font-size:24px;margin-bottom:2px}
.gap h4{color:var(--navy);margin:16px 0 6px}
.gap ul{margin:0 0 6px;padding-left:20px}
.gap li{font-size:13px;margin:3px 0}
.tag-Not{color:var(--cont)} .tag-Part{color:var(--prov)} .tag-Add{color:var(--stat)}
.risk{border-left:4px solid var(--navy);background:#f6f9fc;padding:12px 16px;margin:8px 0 24px;font-size:12.5px;color:#33414f}
.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;padding:9px;border:1px solid var(--line);border-radius:6px;font-size:13px}
.note{font-size:12px;color:var(--muted);margin-top:22px;border-top:1px solid var(--line);padding-top:12px}
.dsl{margin-top:10px}.dsl label{font-size:12px;color:var(--muted)}

<script>
const CRIT = [{"id": "A1", "m": "A", "term": "ADMT identification", "hook": "C.R.S. 6-1-1701(2)(a)", "stmt": "Identify every technology the District uses that processes personal data and generates predictions, recommendations, classifications, rankings, or scores used to make, guide, or assist a decision about an individual.", "src": "Statute", "status": "Statutory", "artifact": "ADMT register entry per system", "verify": ""}, {"id": "A2", "m": "A", "term": "Covered-ADMT determination", "hook": "6-1-1701(5),(13)", "stmt": "For each ADMT, determine whether it is used to materially influence a consequential decision (a non-de-minimis factor affecting the outcome); if so it is a covered ADMT.", "src": "Statute + AG rules", "status": "Provisional", "artifact": "Coverage determination memo per system", "verify": "AG may set presumptions/objective indicators for 'materially influence' \u2014 6-1-1706(5)(b); track rulemaking."}, {"id": "A3", "m": "A", "term": "Education consequential-decision scope", "hook": "6-1-1701(6)(a),(3)(b)(I),(IX)", "stmt": "Determine which District decisions fall in the covered domain 'education enrollment or an education opportunity,' applying the exclusions for routine academic administration/student support (IX), classroom personalization, and low-stakes/routine processes (I).", "src": "Statute + AG rules + comments", "status": "Contested", "artifact": "Scope determination keyed to decision type", "verify": "Live battleground; AG considerations Q IV.2.4 seeks education sector-specific guidance; commenters urge broad construction \u2014 build to broad reading."}, {"id": "A4", "m": "A", "term": "Dyslexia-screener flag", "hook": "READ Act 22-7-1208(9),1209(2.5); 6-1-1701(2)", "stmt": "Flag SB 25-200 universal K-3 dyslexia screeners as candidate covered ADMT (they produce predictive scores/classifications about students), pending materially-influence analysis.", "src": "Statute (READ Act)", "status": "Provisional", "artifact": "Screener inventory entry + coverage note", "verify": "Dual clock lands 2027-28; coverage turns on materially-influence."}, {"id": "A5", "m": "A", "term": "Living inventory maintenance", "hook": "6-1-1703", "stmt": "Maintain the ADMT inventory as a current register that feeds recordkeeping and re-screens on developer material updates.", "src": "Statute", "status": "Statutory", "artifact": "Versioned inventory register", "verify": ""}, {"id": "B1", "m": "B", "term": "Decision/domain classification", "hook": "6-1-1701(3),(6)", "stmt": "For each covered ADMT, classify the decision type and the covered domain it touches.", "src": "Statute", "status": "Statutory", "artifact": "Classification table", "verify": ""}, {"id": "B2", "m": "B", "term": "FERPA-subject determination", "hook": "6-1-1701(11); 20 U.S.C. 1232g", "stmt": "Confirm the District is subject to FERPA (it will be), which conditions the availability of the Part-17 FERPA safe harbors.", "src": "Statute (FERPA)", "status": "Statutory", "artifact": "FERPA-subject attestation", "verify": ""}, {"id": "B3", "m": "B", "term": "Notice safe-harbor (per system)", "hook": "6-1-1704(9)", "stmt": "Determine, per covered ADMT, whether notice/disclosure can be satisfied through the District's FERPA notices and student-record access procedures.", "src": "Statute", "status": "Statutory", "artifact": "Safe-harbor determination per system", "verify": "'System-by-system' reading per direction; confirm."}, {"id": "B4", "m": "B", "term": "Rights safe-harbor (per system)", "hook": "6-1-1705(2)", "stmt": "Determine, per covered ADMT, whether correction and human review can be satisfied through existing student-record inspection/review/amendment and district appeal processes.", "src": "Statute", "status": "Statutory", "artifact": "Safe-harbor determination per system", "verify": ""}, {"id": "B5", "m": "B", "term": "FERPA school-official fit", "hook": "34 C.F.R. 99.31(a)(1)", "stmt": "Confirm each vendor ADMT fits the FERPA school-official exception: legitimate educational interest, institutional function, district direct control, and use/re-disclosure limits.", "src": "Statute (FERPA)", "status": "Statutory", "artifact": "School-official exception checklist per vendor", "verify": ""}, {"id": "B6", "m": "B", "term": "Colorado student-data overlay", "hook": "C.R.S. 22-16-108/109/110", "stmt": "Confirm each vendor qualifies and is bound as a 'school service contract provider' under the Student Data Transparency and Security Act (transparency, use limits, security, destruction).", "src": "Statute (state)", "status": "Statutory", "artifact": "22-16 compliance checklist per vendor", "verify": "Pull 22-16-103 definitions when drafting."}, {"id": "C1", "m": "C", "term": "Point-of-interaction notice", "hook": "6-1-1704(1)", "stmt": "Provide clear-and-conspicuous notice before using a covered ADMT to materially influence a consequential decision, with instructions to obtain further information.", "src": "Statute", "status": "Statutory", "artifact": "Notice template", "verify": ""}, {"id": "C2", "m": "C", "term": "Public-posting option", "hook": "6-1-1704(2)", "stmt": "May satisfy the notice duty via a prominent public notice reasonably accessible/proximate at points of consumer interaction.", "src": "Statute", "status": "Statutory", "artifact": "Public notice page", "verify": ""}, {"id": "C3", "m": "C", "term": "Post-adverse-outcome disclosure", "hook": "6-1-1704(3)", "stmt": "Within 30 days of an adverse-outcome decision, provide a plain-language description, the ADMT's role, a process to request information (name, version, developer, data categories), and an explanation of consumer rights.", "src": "Statute + AG rules", "status": "Provisional", "artifact": "Adverse-outcome disclosure template", "verify": "Content further shaped by AG rules due 1/1/2027 \u2014 6-1-1704(4); AG considerations Q IV.2."}, {"id": "C4", "m": "C", "term": "FERPA-routed notice", "hook": "6-1-1704(9)", "stmt": "Where FERPA-subject, deliver notice/disclosure through FERPA notices and student-record access procedures (parent/guardian/eligible student); no separate process required.", "src": "Statute", "status": "Statutory", "artifact": "FERPA-integrated notice procedure", "verify": ""}, {"id": "C5", "m": "C", "term": "Accessibility", "hook": "6-1-1704(8)", "stmt": "Provide notices/disclosures reasonably accessible to consumers with disabilities and limited English proficiency.", "src": "Statute", "status": "Statutory", "artifact": "Accessibility conformance note", "verify": ""}, {"id": "C6", "m": "C", "term": "Parent/eligible-student access", "hook": "6-1-1705(1)(a)(I); 34 C.F.R. 99.20-.21; C.R.S. 22-16-112", "stmt": "Provide parent/guardian/eligible-student access to, and a mechanism to request correction of, personal data, consistent with FERPA and the 22-16 parent-rights/complaint provisions.", "src": "Statute (Part 17 + FERPA + state)", "status": "Statutory", "artifact": "Access & complaint procedure", "verify": ""}, {"id": "D1", "m": "D", "term": "Three-year decision records", "hook": "6-1-1703", "stmt": "Retain, for at least three years after each consequential decision, records reasonably necessary to demonstrate Part-17 compliance. No FERPA safe harbor applies to this duty.", "src": "Statute", "status": "Statutory", "artifact": "Records retention schedule + store", "verify": "Standalone duty \u2014 the hardest; no FERPA analog."}, {"id": "D2", "m": "D", "term": "Record contents", "hook": "6-1-1703", "stmt": "Records include covered-ADMT version identifiers, changelogs, and documentation of material mitigation changes.", "src": "Statute", "status": "Statutory", "artifact": "Record schema", "verify": ""}, {"id": "D3", "m": "D", "term": "Data security & destruction", "hook": "C.R.S. 22-16-107/110", "stmt": "Maintain a data-security policy and vendor data-destruction practices consistent with the Student Data Transparency and Security Act.", "src": "Statute (state)", "status": "Statutory", "artifact": "Security policy + destruction log", "verify": ""}, {"id": "D4", "m": "D", "term": "Enforcement-ready evidencing", "hook": "6-1-1703; 6-1-1706", "stmt": "Ensure records are sufficient to demonstrate compliance to the Attorney General (sole enforcer).", "src": "Statute", "status": "Statutory", "artifact": "Compliance evidence index", "verify": ""}, {"id": "E1", "m": "E", "term": "Developer documentation intake", "hook": "6-1-1702(1)", "stmt": "Obtain and retain developer documentation: intended and known-harmful uses, training-data categories (to the extent known), known limitations/risks, and appropriate-use/monitoring/human-review instructions.", "src": "Statute", "status": "Statutory", "artifact": "Developer documentation file per ADMT", "verify": "Developer duty; deployer must secure receipt (1702(1)(e) withholding notice)."}, {"id": "E2", "m": "E", "term": "FERPA contract controls", "hook": "34 C.F.R. 99.31(a)(1),99.33", "stmt": "Vendor contract imposes District direct control over records and purpose-limitation / use-&-re-disclosure limits (no reuse or resale).", "src": "Statute (FERPA)", "status": "Statutory", "artifact": "Contract clause set", "verify": ""}, {"id": "E3", "m": "E", "term": "22-16 provider terms", "hook": "C.R.S. 22-16-108/109/110", "stmt": "Vendor contract meets school-service-contract-provider transparency, use-limitation, security, and destruction duties.", "src": "Statute (state)", "status": "Statutory", "artifact": "Contract clause set", "verify": ""}, {"id": "E4", "m": "E", "term": "Screener validity gate", "hook": "READ Act 22-7-1209(2.5)", "stmt": "Procurement gate screens dyslexia/predictive screeners against the \u00a71209(2.5) technical criteria (validity, classification accuracy, public technical manual, research-based cutoff points).", "src": "Statute (READ Act)", "status": "Statutory", "artifact": "Screener validity checklist", "verify": "Also supports construct-validity concerns raised by commenters."}, {"id": "E5", "m": "E", "term": "Indemnification-void check", "hook": "6-1-1707(7)", "stmt": "Ensure contracts do not purport to indemnify against Colorado Anti-Discrimination Act liability arising from covered-ADMT decisions (such terms are void as against public policy).", "src": "Statute", "status": "Statutory", "artifact": "Contract review note", "verify": ""}, {"id": "E6", "m": "E", "term": "Material-update handling", "hook": "6-1-1702(2)", "stmt": "Process developer notices of material updates and modifications; trigger re-inventory and re-classification.", "src": "Statute", "status": "Statutory", "artifact": "Update-handling procedure", "verify": ""}, {"id": "F1", "m": "F", "term": "Reviewer override authority", "hook": "6-1-1701(15)", "stmt": "Designate a human reviewer with authority to approve, modify, or override the consequential decision.", "src": "Statute", "status": "Statutory", "artifact": "Reviewer designation + authority record", "verify": ""}, {"id": "F2", "m": "F", "term": "Reviewer independence & training", "hook": "6-1-1701(15)(a)-(c)", "stmt": "The reviewer considers relevant available primary evidence, is trained to conduct the review, and does not default to the system output.", "src": "Statute", "status": "Statutory", "artifact": "Training records + review protocol", "verify": ""}, {"id": "F3", "m": "F", "term": "Reviewer information access", "hook": "6-1-1701(15)(d)", "stmt": "The reviewer has access to understand the output's intended use, material limitations, input categories, and principal factors, without trade-secret disclosure.", "src": "Statute", "status": "Statutory", "artifact": "Information-access checklist", "verify": ""}, {"id": "F4", "m": "F", "term": "Review & reconsideration on adverse outcome", "hook": "6-1-1705(1)(a)(II)", "stmt": "On an adverse outcome, provide an opportunity for meaningful human review and reconsideration, to the extent commercially reasonable.", "src": "Statute + AG rules", "status": "Provisional", "artifact": "Reconsideration procedure", "verify": "'Commercially reasonable' shaped by AG rules due 1/1/2027 \u2014 6-1-1705(3); commenters propose proportionality factors."}, {"id": "F5", "m": "F", "term": "Data correction", "hook": "6-1-1705(1)(a)(I),(c)", "stmt": "Provide correction of factually incorrect or materially inaccurate personal data; correction of opinions, predictions, scores, or protected evaluations is not required.", "src": "Statute", "status": "Statutory", "artifact": "Correction procedure", "verify": ""}, {"id": "F6", "m": "F", "term": "FERPA-routed review/correction", "hook": "6-1-1705(2)", "stmt": "Where FERPA-subject, satisfy correction and human review through existing student-record inspection/review/amendment and district complaint/appeal processes.", "src": "Statute", "status": "Statutory", "artifact": "FERPA-integrated review procedure", "verify": ""}, {"id": "F7", "m": "F", "term": "Oversight audit discipline", "hook": "6-1-1701(15)(c); AG Q; comments", "stmt": "Document internal audits evidencing that reviewers do not default to the system output (e.g., a planted-error catch-rate program), anticipating the AG's 'meaningful review' standard.", "src": "Comment record + AG rules", "status": "Contested", "artifact": "Audit program record", "verify": "Differentiator; AG considerations consumer-rights Q1; Substrate Rec 2; Brown. Not yet required \u2014 provisional."}, {"id": "X1", "m": "X", "term": "Sole enforcer / no private right", "hook": "6-1-1706(1)(b),1709", "stmt": "Part 17 is enforced exclusively by the Attorney General; it creates no new private right of action.", "src": "Statute", "status": "Statutory", "artifact": "Risk memo", "verify": ""}, {"id": "X2", "m": "X", "term": "Right to cure", "hook": "6-1-1706(3)", "stmt": "A 60-day cure follows a notice of violation unless the violation is knowing or repeated; the cure provision repeals 1/1/2030.", "src": "Statute", "status": "Statutory", "artifact": "Risk memo", "verify": ""}, {"id": "X3", "m": "X", "term": "Residual anti-discrimination exposure", "hook": "6-1-1706(4),1707", "stmt": "Existing Colorado Anti-Discrimination Act remedies (which carry private enforcement) are preserved; covered-ADMT disparate impact is the residual private-litigation channel.", "src": "Statute", "status": "Statutory", "artifact": "Risk memo", "verify": ""}, {"id": "X4", "m": "X", "term": "Effective date", "hook": "SB 26-189 \u00a75", "stmt": "Effective 1/1/2027; applies to consequential decisions made on or after that date.", "src": "Statute", "status": "Statutory", "artifact": "Compliance calendar", "verify": ""}];
const MODS = {"A": {"name": "ADMT Inventory", "hook": "C.R.S. 6-1-1701(2), 1703", "model": "The District shall maintain a current inventory of every automated decision-making technology it uses to make, guide, or assist decisions about students, identifying for each system whether it materially influences a consequential decision within a covered education domain."}, "B": {"name": "Classification & FERPA Crosswalk", "hook": "6-1-1701(15); FERPA; C.R.S. 22-16", "model": "For each covered system, the District shall classify the decision type and covered domain, confirm its status as a FERPA-subject education agency, and determine on a system-by-system basis whether the FERPA notice and correction safe harbors apply."}, "C": {"name": "Notice & Parent Access", "hook": "6-1-1704", "model": "The District shall provide clear and conspicuous notice before a covered system is used in a consequential decision affecting a student, and shall deliver required notices and post-adverse-outcome disclosures through its existing FERPA notice and student-record access procedures."}, "D": {"name": "Recordkeeping", "hook": "6-1-1703; C.R.S. 22-16", "model": "The District shall retain, for no less than three years after each consequential decision, records sufficient to demonstrate compliance \u2014 including system version identifiers, changelogs, and documentation of material mitigation changes \u2014 recognizing that this recordkeeping duty has no FERPA equivalent."}, "E": {"name": "Procurement & Vendor Management", "hook": "6-1-1702; FERPA; C.R.S. 22-16; READ Act", "model": "Before deploying a covered system, the District shall obtain the developer's documentation and shall contract only with vendors that accept the District's direct control over education records, purpose limitations, and the data-security and destruction duties required by Colorado law."}, "F": {"name": "Human Review & Oversight", "hook": "6-1-1701(15); 6-1-1705", "model": "A consequential decision materially influenced by a covered system shall be subject to review by a trained District official who has authority to approve, modify, or override the decision, who considers primary evidence, and who does not default to the system's output."}, "X": {"name": "Enforcement & Risk (context)", "hook": "6-1-1706; 6-1-1707; 6-1-1709", "model": "Reference context on enforcement and residual liability; not a district policy section."}};
const ORDER = ["A","B","C","D","E","F"];
const state = {}; CRIT.forEach(c=>state[c.id]="Not addressed");
const district = {name:"",ferpa:"Yes",source:"BoardBook import"};
function badge(s){return '<span class="badge b-'+s+'">'+s+'</span>';}
function ferpaNote(c){ if(/1704\(9\)|1705\(2\)|99\.31|99\.20/.test(c.hook)) return '<div class="ferpa">Satisfiable through your existing FERPA process — '+c.hook+'</div>'; return '';}
function secnav(){let h="";ORDER.forEach(m=>{h+='<button class="secbtn" onclick="go(\''+m+'\')">'+m+': '+MODS[m].name+'</button>';});document.getElementById('secnav').innerHTML=h;}
function counts(m){const cs=CRIT.filter(c=>c.m.startsWith(m));const add=cs.filter(c=>state[c.id]==="Addressed").length;const part=cs.filter(c=>state[c.id]==="Partially addressed").length;return{t:cs.length,add,part};}
function progress(){const all=CRIT.filter(c=>ORDER.includes(c.m[0]));const add=all.filter(c=>state[c.id]==="Addressed").length;return{add,t:all.length,pct:Math.round(100*add/all.length)};}
function dash(){const p=progress();let cards="";ORDER.forEach(m=>{const c=counts(m);const md=MODS[m];const st=c.add===c.t?"Addressed":(c.add+c.part>0?"In progress":"Incomplete");
 cards+='<div class="card"><h3>'+m+' — '+md.name+'</h3><div class="hook">'+md.hook+'</div><div class="desc">'+shortdesc(m)+'</div>'
 +'<div class="meta"><span class="cnt">'+c.add+'/'+c.t+'</span> requirements addressed · '+st+'</div>'
 +'<button class="editbtn" onclick="go(\''+m+'\')">Edit Section '+m+'</button></div>';});
 return '<div class="pill">AG rulemaking in progress — provisional items flagged</div>'
 +'<h1>SB 26-189 Compliance Dashboard</h1><p class="sub">Colorado school-district deployer compliance for automated decision-making technology.</p>'
 +'<div style="font-size:18px;font-weight:600">Compliance Progress: '+p.add+' of '+p.t+' requirements addressed</div>'
 +'<div class="bar"><i style="width:'+p.pct+'%"></i></div>'
 +'<div class="risk"><b>Enforcement &amp; risk context:</b> Part 17 is enforced solely by the Attorney General with no private right of action (§6-1-1706, 1709); a 60-day cure applies unless knowing/repeated (repeals 2030). Residual private exposure runs through the Colorado Anti-Discrimination Act (§6-1-1707). Effective Jan 1, 2027.</div>'
 +'<h2 style="color:var(--navy)">Policy Sections</h2><div class="grid">'+cards+'</div>';}
function shortdesc(m){return {A:"Academic Integrity — no. Inventory every covered AI decision system.",B:"Classify each system and crosswalk it to FERPA safe harbors.",C:"Notice families and disclose adverse outcomes — via FERPA.",D:"Retain three-year decision records (no FERPA analog).",E:"Gate vendors on FERPA, Colorado data law, and screener validity.",F:"Ensure a trained human can override every covered decision."}[m];}
function section(m){const md=MODS[m];const cs=CRIT.filter(c=>c.m.startsWith(m));let rows="";
 cs.forEach(c=>{rows+='<div class="crit"><div class="top"><span class="id">'+c.id+' · '+c.term+'</span>'+badge(c.status)+'</div>'
 +'<div class="stmt">'+c.stmt+'</div><div class="hook">'+c.hook+'</div>'+ferpaNote(c)
 +'<div><select onchange="setStat(\''+c.id+'\',this.value)">'
 +['Not addressed','Partially addressed','Addressed'].map(o=>'<option'+(state[c.id]===o?' selected':'')+'>'+o+'</option>').join('')
 +'</select></div></div>';});
 return '<div class="pill">AG rulemaking in progress — provisional items flagged</div>'
 +'<div class="sectitle">Section '+m+': '+md.name+'</div><p class="sub">Statutory basis: '+md.hook+'</p>'
 +'<div class="model"><div class="lbl">Model Policy Language — original, offered for CASB ownership (draft)</div>'+md.model+'</div>'
 +'<h3 style="color:var(--navy)">Requirement Assessment</h3>'+rows
 +'<div class="dsl field"><label>District-Specific Language (optional)</label><textarea rows="3" placeholder="Customize the model language for your district…"></textarea></div>'
 +'<div class="note">Model language is original work product offered for CASB ownership. Provisional and Contested items are subject to the Attorney General’s final rules.</div>';}
function districtView(){return '<h1>District Info</h1><p class="sub">Context that drives the examination of your policies.</p>'
 +'<div class="field"><label>District name</label><input value="'+district.name+'" oninput="district.name=this.value"></div>'
 +'<div class="field"><label>Subject to FERPA?</label><select onchange="district.ferpa=this.value"><option'+(district.ferpa==="Yes"?" selected":"")+'>Yes</option><option>No</option></select></div>'
 +'<div class="field"><label>How do your policies and procedures reach us?</label><select onchange="district.source=this.value"><option'+(district.source==="BoardBook import"?" selected":"")+'>BoardBook import</option><option>Document upload</option></select></div>'
 +'<div class="note">FERPA-subject status governs which safe-harbor language appears throughout your sections.</div>';}
function gap(){let h='<h1>Gap Analysis &amp; Revision</h1><p class="sub">Where your policies and procedures stand against SB 26-189, provision by provision.</p><div class="gap">';
 ORDER.forEach(m=>{const cs=CRIT.filter(c=>c.m.startsWith(m));const miss=cs.filter(c=>state[c.id]==="Not addressed");const part=cs.filter(c=>state[c.id]==="Partially addressed");const add=cs.filter(c=>state[c.id]==="Addressed");
  h+='<h4>'+m+' — '+MODS[m].name+'</h4><ul>';
  if(miss.length)h+='<li class="tag-Not"><b>Missing ('+miss.length+'):</b> '+miss.map(c=>c.id+' '+c.term+' ['+c.hook+']').join('; ')+'</li>';
  if(part.length)h+='<li class="tag-Part"><b>Partial ('+part.length+'):</b> '+part.map(c=>c.id+' '+c.term).join('; ')+'</li>';
  if(add.length)h+='<li class="tag-Add"><b>Addressed ('+add.length+'):</b> '+add.map(c=>c.id).join(', ')+'</li>';
  if(!cs.length)h+='<li>—</li>';h+='</ul>';});
 const p=progress();
 h+='</div><div class="risk">Revision export (stub): COMPLY would now amend the '+(p.t-p.add)+' unmet items and generate original policy language — routed through your FERPA processes — producing an AG-calculated revision offered for CASB ownership. Wiring this export to a document generator is a Gate 2 build step.</div>';
 return h;}
function setStat(id,v){state[id]=v;}
function go(v){let el=document.getElementById('main');
 if(v==='dash')el.innerHTML=dash();else if(v==='district')el.innerHTML=districtView();else if(v==='gap')el.innerHTML=gap();else el.innerHTML=section(v);
 window.scrollTo(0,0);}
secnav();go('dash');
</script></body></html>
